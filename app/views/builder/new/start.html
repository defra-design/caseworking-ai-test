{% extends "layouts/main.html" %}

{% block content %}
<div class="govuk-width-container">
  <main class="govuk-main-wrapper">
    <div class="govuk-grid-row">
      <div class="govuk-grid-column-two-thirds">

        {{ govukBackLink({ text: "Back", href: "/builder" }) }}

        <h1 class="govuk-heading-xl">Build a new tasklist</h1>
        <p class="govuk-body">Step 1 of 4 — start by saying how many stages you want.</p>

        <form action="/builder/new/start" method="post">
          <div class="govuk-form-group">
            <label class="govuk-label govuk-label--m" for="stageCount">How many stages do you want?</label>
            <input class="govuk-input govuk-input--width-3" id="stageCount" name="stageCount" type="number" min="1" max="20" value="{{ data.builderFlow.stageCount or '' }}">
          </div>
          <button type="submit" class="govuk-button" data-module="govuk-button">Continue</button>
        </form>

      </div>
    </div>
  </main>
</div>
{% endblock %}
